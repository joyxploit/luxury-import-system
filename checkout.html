<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - Luxury Import</title>
  <link rel="stylesheet" href="style/cart.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">LUXURY IMPORT</a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="categories.html">Categories</a></li>
        <li><a href="cart.html">Cart</a></li>
      </ul>
    </div>
  </nav>

  <main class="container">
    <h1>Checkout</h1>

    <div class="checkout-wrapper">

      <div class="checkout-form-card">
        <h2>Shipping Details</h2>
        <form id="checkout-form">
          
          <div style="display: flex; gap: 15px;">
              <div style="flex: 1;">
                  <label for="name">Full Name *</label>
                  <input type="text" id="name" placeholder="John Doe" required style="width: 100%; padding: 10px; margin-bottom: 10px;">
              </div>
              <div style="flex: 1;">
                  <label for="phone">Phone Number *</label>
                  <input type="tel" id="phone" placeholder="0712 345 678" required style="width: 100%; padding: 10px; margin-bottom: 10px;">
              </div>
          </div>

          <label for="email">Email Address *</label>
          <input type="email" id="email" placeholder="example@email.com" required style="width: 100%; padding: 10px; margin-bottom: 10px;">

          <div style="display: flex; gap: 15px;">
              <div style="flex: 1;">
                  <label for="county">County *</label>
                  <input type="text" id="county" placeholder="e.g., Nairobi" required style="width: 100%; padding: 10px; margin-bottom: 10px;">
              </div>
              <div style="flex: 1;">
                  <label for="town">Town *</label>
                  <input type="text" id="town" placeholder="e.g., Westlands" required style="width: 100%; padding: 10px; margin-bottom: 10px;">
              </div>
          </div>

          <label for="address">Detailed Address / Estate</label>
          <textarea id="address" placeholder="Estate name, house number, or landmark..." required style="width: 100%; padding: 10px; height: 80px;"></textarea>

          <button type="submit" id="place-order-btn" style="width: 100%; padding: 12px; background: #D4AF37; color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 20px;">Place Order</button>
        </form>
      </div>

      <div class="checkout-cart-card">
        <h2>Order Summary</h2>
        <div id="checkout-cart-items"></div>
        <div class="checkout-total" style="margin-top: 20px; border-top: 2px solid #eee; padding-top: 10px; display: flex; justify-content: space-between; font-weight: bold; font-size: 18px;">
          <span>Total:</span>
          <span id="checkout-cart-total">Ksh 0.00</span>
        </div>
      </div>

    </div>
  </main>

  <div id="toast-message" class="hidden"></div>
  <script src="../scripts/api.js"></script>
  <script src="../scripts/checkout.js"></script>
  <script src="../scripts/auth.js"></script>
</body>
</html>
