<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seller Dashboard | Luxury Import</title>
  <link rel="stylesheet" href="style/seller.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <style>

    .btn-home {
      text-decoration: none;
      background-color: #D4AF37;
      color: white;
      padding: 8px 16px;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Montserrat', sans-serif;
      transition: background 0.3s;
    }
    .btn-home:hover {
      background-color: #b5952f;
    }
  </style>
</head>
<body>
  <div class="container">
    
    <header class="header">
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <h1>Seller Dashboard</h1>
        <a href="../pages/index.html" class="btn-home">Back to Home</a>
        <button class="icon-btn" id="logoutBtn" title="Logout">
         <span class="icon">🚪 log out </span>
         </button>

      </div>
      <p>Manage your inventory </p>
    </header>

    <main class="main-grid">
      
      <section class="form-section">
        <div class="form-card">
          <h2 id="form-title">➕ Add New Product</h2>
          
          <form id="sellerForm">
            
            <div class="form-group">
              <label for="productName">Product Name *</label>
              <input type="text" id="productName" placeholder="e.g., Gold Rolex" required>
            </div>

            <div class="form-group">
              <label for="productPrice">Price (KSh) *</label>
              <input type="number" id="productPrice" placeholder="150000" required min="0">
            </div>

            <div class="form-group">
              <label for="productCategory">Category *</label>
              <select id="productCategory" required>
                <option value="">Select Category</option>
                <option value="bags">👜 Designer Bags</option>
                <option value="perfumes">🌺 Luxury Perfumes</option>
                <option value="watches">⌚ Premium Watches</option>
                <option value="shoes">👞 Designer Shoes</option>
                <option value="sunglasses">🕶️ Sunglasses</option>
                <option value="charms">📿 Bag Charms</option>
                <option value="jewelry">💎 Jewelry</option>
                <option value="apparel">🧥 Fashion Apparel</option>
              </select>
            </div>

            <div class="form-group">
              <label for="productDescription">Description *</label>
              <textarea id="productDescription" placeholder="Describe item condition and details..." style="width:100%; height:80px; padding:10px; border:1px solid #ddd;" required></textarea>
            </div>

            <div class="form-group">
              <label for="productImage">Product Image *</label>
              <input type="file" id="productImage" accept="image/*" required>
              
              <div id="previewContainer" style="display: none; margin-top: 10px; border: 1px solid #eee; padding: 5px;">
                  <p style="margin:0 0 5px 0; font-size:12px; color:#666;">Preview:</p>
                  <img id="productImagePreview" src="" alt="Preview" style="width: 100%; height: 200px; object-fit: contain;">
              </div>
            </div>

            <div class="button-group">
              <button type="submit" id="submitBtn" class="btn-primary">Publish Item</button>
            </div>

          </form>
        </div>
      </section>

      <section class="products-section">
        <div class="products-card">
      

          <div id="noProducts" class="no-products" style="display: none;">
            <p>No products yet</p>
            <span>Add your first product to get started!</span>
          </div>

          <div id="sellerProducts" class="seller-products-grid">
            <p style="text-align: center; padding: 20px;">Loading...</p>
          </div>
        </div>
      </section>

    </main>
  </div>

  <script src="scripts/api.js"></script>
  <script src="scripts/seller.js"></script>
  <script src="scripts/auth.js"></script>
</body>
</html>
