<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Suggestions | Luxury Import Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #f9f9f9; color: #333; }
    .header {
      background: #1a1a1a;
      color: white;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: #d4a574; }
    .header a { color: #d4a574; text-decoration: none; font-size: 0.9rem; }
    .container { max-width: 1200px; margin: 2rem auto; padding: 0 2rem; }
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .stat-card {
      background: #fff;
      border-radius: 8px;
      padding: 1.2rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      text-align: center;
    }
    .stat-card h3 { font-size: 2rem; color: #d4a574; font-family: 'Playfair Display', serif; }
    .stat-card p { font-size: 0.85rem; color: #888; margin-top: 0.3rem; }
    .filters {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .filters input, .filters select {
      padding: 0.6rem 1rem;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 0.9rem;
      font-family: 'Inter', sans-serif;
    }
    .filters input { flex: 1; min-width: 200px; }
    .suggestion-card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      padding: 1.5rem;
      margin-bottom: 1rem;
      border-left: 4px solid #d4a574;
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1rem;
    }
    .card-header h3 { font-size: 1.1rem; color: #1a1a1a; margin-bottom: 0.3rem; }
    .card-header .date { font-size: 0.8rem; color: #999; }
    .category-badge {
      background: #fff8f0;
      color: #d4a574;
      border: 1px solid #d4a574;
      padding: 0.3rem 0.8rem;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 500;
    }
    .card-details {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 0.8rem;
      margin-bottom: 1rem;
    }
    .detail-item { font-size: 0.9rem; }
    .detail-item span { color: #888; font-size: 0.8rem; display: block; }
    .description-box {
      background: #f9f9f9;
      border-radius: 4px;
      padding: 0.8rem;
      font-size: 0.9rem;
      color: #555;
      margin-bottom: 1rem;
      line-height: 1.6;
    }
    .images-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .images-row img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 4px;
      border: 1px solid #eee;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .images-row img:hover { transform: scale(1.05); }
    .no-suggestions {
      text-align: center;
      padding: 3rem;
      color: #888;
      background: #fff;
      border-radius: 8px;
    }
    .loading { text-align: center; padding: 3rem; color: #888; }

    /* Image Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      z-index: 9999;
      align-items: center;
      justify-content: center;
    }
    .modal.open { display: flex; }
    .modal img {
      max-width: 90%;
      max-height: 90vh;
      border-radius: 8px;
    }
    .modal-close {
      position: fixed;
      top: 20px; right: 30px;
      color: white;
      font-size: 2rem;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>Customer Suggestions</h1>
    <a href="../seller-dashboard.html">← Back to Dashboard</a>
  </div>

  <div class="container">

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <h3 id="totalCount">0</h3>
        <p>Total Requests</p>
      </div>
      <div class="stat-card">
        <h3 id="todayCount">0</h3>
        <p>Today</p>
      </div>
      <div class="stat-card">
        <h3 id="withBudget">0</h3>
        <p>With Budget</p>
      </div>
    </div>

    <!-- Filters -->
    <div class="filters">
      <input type="text" id="searchInput" placeholder="Search by name, product, email...">
      <select id="categoryFilter">
        <option value="">All Categories</option>
        <option value="bags">Designer Bags</option>
        <option value="perfumes">Perfumes</option>
        <option value="watches">Watches</option>
        <option value="shoes">Shoes</option>
        <option value="sunglasses">Sunglasses</option>
        <option value="charms">Bag Charms</option>
        <option value="jewelry">Jewelry</option>
        <option value="apparel">Fashion Apparel</option>
        <option value="other">Other</option>
      </select>
    </div>

    <!-- Suggestions List -->
    <div id="suggestionsList">
      <div class="loading">Loading suggestions...</div>
    </div>

  </div>

  <!-- Image Modal -->
  <div class="modal" id="imageModal" onclick="closeModal()">
    <span class="modal-close">×</span>
    <img id="modalImg" src="" alt="Reference Image">
  </div>

  <script>
    let allSuggestions = [];

    document.addEventListener('DOMContentLoaded', () => {
      // Check admin access
      const user = JSON.parse(localStorage.getItem('currentUser'));
      if (!user || (user.role !== 'admin' && user.role !== 'seller')) {
        alert('Access denied. Admins only.');
        window.location.href = '../login.html';
        return;
      }

      loadSuggestions();

      document.getElementById('searchInput').addEventListener('input', filterSuggestions);
      document.getElementById('categoryFilter').addEventListener('change', filterSuggestions);
    });

    async function loadSuggestions() {
      try {
        const token = localStorage.getItem('token') || localStorage.getItem('authToken');
        const response = await fetch('https://luxury-backend-qtck.onrender.com/api/suggestions', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await response.json();

        if (data.success) {
          allSuggestions = data.suggestions;
          updateStats(allSuggestions);
          renderSuggestions(allSuggestions);
        } else {
          document.getElementById('suggestionsList').innerHTML = '<div class="no-suggestions">Failed to load suggestions.</div>';
        }
      } catch (err) {
        document.getElementById('suggestionsList').innerHTML = '<div class="no-suggestions">Server error. Please try again.</div>';
      }
    }

    function updateStats(suggestions) {
      document.getElementById('totalCount').textContent = suggestions.length;
      const today = new Date().toDateString();
      const todayCount = suggestions.filter(s => new Date(s.created_at).toDateString() === today).length;
      document.getElementById('todayCount').textContent = todayCount;
      const withBudget = suggestions.filter(s => s.budget && s.budget > 0).length;
      document.getElementById('withBudget').textContent = withBudget;
    }

    function filterSuggestions() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const category = document.getElementById('categoryFilter').value;

      const filtered = allSuggestions.filter(s => {
        const matchSearch = !search ||
          s.name?.toLowerCase().includes(search) ||
          s.product?.toLowerCase().includes(search) ||
          s.email?.toLowerCase().includes(search) ||
          s.description?.toLowerCase().includes(search);
        const matchCategory = !category || s.category === category;
        return matchSearch && matchCategory;
      });

      renderSuggestions(filtered);
    }

    function renderSuggestions(suggestions) {
      const list = document.getElementById('suggestionsList');

      if (suggestions.length === 0) {
        list.innerHTML = '<div class="no-suggestions"><h3>No suggestions found</h3><p>No customer requests yet.</p></div>';
        return;
      }

      list.innerHTML = suggestions.map(s => {
        const date = new Date(s.created_at).toLocaleDateString('en-KE', {
          day: 'numeric', month: 'short', year: 'numeric'
        });

        let images = [];
        try { images = JSON.parse(s.images) || []; } catch(e) {}

        const imagesHTML = images.length > 0
          ? `<div class="images-row">
              ${images.map(img => `<img src="${img}" onclick="openModal('${img}')" alt="Reference">`).join('')}
            </div>`
          : '<p style="font-size:0.85rem; color:#bbb;">No images uploaded</p>';

        return `
          <div class="suggestion-card">
            <div class="card-header">
              <div>
                <h3>${s.product || 'Unnamed Product'}</h3>
                <div class="date">Submitted: ${date}</div>
              </div>
              <span class="category-badge">${s.category || 'Other'}</span>
            </div>
            <div class="card-details">
              <div class="detail-item">
                <span>Customer Name</span>
                ${s.name || '—'}
              </div>
              <div class="detail-item">
                <span>Phone</span>
                ${s.phone || '—'}
              </div>
              <div class="detail-item">
                <span>Email</span>
                ${s.email || '—'}
              </div>
              <div class="detail-item">
                <span>Budget</span>
                ${s.budget ? 'Ksh ' + Number(s.budget).toLocaleString() : 'Not specified'}
              </div>
            </div>
            <div class="description-box">${s.description || 'No description provided.'}</div>
            ${imagesHTML}
          </div>
        `;
      }).join('');
    }

    function openModal(src) {
      document.getElementById('modalImg').src = src;
      document.getElementById('imageModal').classList.add('open');
    }

    function closeModal() {
      document.getElementById('imageModal').classList.remove('open');
    }
  </script>

</body>
</html>
